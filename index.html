<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/syncc.png" />
    <title>مجموعة مارجرجس الكشفية</title>
    <script>
      // Filter out expected network errors from the console, especially when testing offline mode
      const originalConsoleError = console.error;
      const originalConsoleWarn = console.warn;
      const originalConsoleLog = console.log;

      function shouldSuppress(...args) {
        let msg = '';
        try {
          msg = args.map(arg => typeof arg === 'object' && arg !== null ? (arg.message || arg.toString() || JSON.stringify(arg)) : String(arg)).join(' ');
        } catch (e) {
          msg = String(args[0]);
        }
        
        return (
          msg.includes('Error processing response text') ||
          msg.includes('Fetch request failed') ||
          msg.includes('The user aborted a request') ||
          msg.includes('signal is aborted without reason') ||
          msg.includes('Failed to fetch') ||
          msg.includes('net::ERR_ABORTED') ||
          msg.includes('net::ERR_CONNECTION_REFUSED')
        );
      }

      console.error = function(...args) {
        if (shouldSuppress(...args)) return;
        originalConsoleError.apply(console, args);
      };
      
      console.warn = function(...args) {
        if (shouldSuppress(...args)) return;
        originalConsoleWarn.apply(console, args);
      };

      console.log = function(...args) {
        if (shouldSuppress(...args)) return;
        originalConsoleLog.apply(console, args);
      };

      window.addEventListener('unhandledrejection', function(event) {
        const msg = event.reason ? (event.reason.message || event.reason.toString()) : '';
        if (
          msg.includes('The user aborted a request') ||
          msg.includes('signal is aborted without reason') ||
          msg.includes('Failed to fetch') ||
          msg.includes('Error processing response text')
        ) {
          event.preventDefault();
        }
      });

      window.addEventListener('error', function(event) {
        const msg = event.message || '';
        if (
          msg.includes('The user aborted a request') ||
          msg.includes('signal is aborted without reason') ||
          msg.includes('Failed to fetch') ||
          msg.includes('Error processing response text')
        ) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
